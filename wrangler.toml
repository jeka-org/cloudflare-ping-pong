name = "global-pong"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "pong.jeka.org", custom_domain = true }
]

[[durable_objects.bindings]]
name = "GAME_ROOM"
